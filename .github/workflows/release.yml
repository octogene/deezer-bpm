name: Build & Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Sync manifest version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' manifest.json > tmp.json
          mv tmp.json manifest.json

      - name: Build extension
        run: |
          web-ext build \
            --source-dir . \
            --artifacts-dir web-ext-artifacts

      - name: Sign extension
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          web-ext sign \
            --source-dir . \
            --artifacts-dir web-ext-artifacts \
            --api-key  "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET" \
            --channel unlisted

      - name: Collect artifacts
        id: artifacts
        run: |
          ZIP=$(ls web-ext-artifacts/*.zip | head -1)
          XPI=$(ls web-ext-artifacts/*.xpi | head -1)
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "xpi=$XPI" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifacts.outputs.zip }}
            ${{ steps.artifacts.outputs.xpi }}
          generate_release_notes: true
