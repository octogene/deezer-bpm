<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Deezer BPM</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f0f1a;
        --surface: #1a1a2e;
        --border: #2a2a44;
        --purple: #a238ff;
        --purple-lt: #c97dff;
        --green: #1db954;
        --red: #ff5c7a;
        --text: #e8e8f0;
        --muted: #888;
      }

      body {
        width: 300px;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        line-height: 1.5;
        padding: 16px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }

      .header img {
        width: 28px;
        height: 28px;
        border-radius: 50%;
      }

      .header h1 {
        font-size: 0.95rem;
        font-weight: 800;
      }

      .count {
        color: var(--muted);
        font-size: 0.8rem;
        margin-bottom: 16px;
      }

      .group {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface);
        padding: 14px;
        margin-bottom: 12px;
      }

      .group h2 {
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 4px;
      }

      .group p {
        color: var(--muted);
        font-size: 0.78rem;
        margin-bottom: 10px;
      }

      button {
        width: 100%;
        padding: 9px 12px;
        border-radius: 8px;
        border: 1px solid color-mix(in srgb, var(--purple) 45%, transparent);
        background: color-mix(in srgb, var(--purple) 18%, transparent);
        color: var(--purple-lt);
        font-family: inherit;
        font-size: 0.82rem;
        font-weight: 700;
        cursor: pointer;
        transition:
          background 0.18s,
          border-color 0.18s,
          opacity 0.18s;
      }

      button:hover:not(:disabled) {
        background: color-mix(in srgb, var(--purple) 28%, transparent);
        border-color: color-mix(in srgb, var(--purple) 65%, transparent);
      }

      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .replace-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
        color: var(--muted);
        font-size: 0.78rem;
        cursor: pointer;
        user-select: none;
      }

      .replace-row input {
        accent-color: var(--purple);
        cursor: pointer;
      }

      #status {
        min-height: 1.2em;
        font-size: 0.78rem;
        line-height: 1.4;
      }

      #status.ok {
        color: var(--green);
      }

      #status.err {
        color: var(--red);
      }

      #status.info {
        color: var(--muted);
      }

      .hidden-file {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="../icons/icon128.png" alt="" />
      <h1>Deezer BPM</h1>
    </div>

    <p class="count" id="count">Loading…</p>

    <div class="group">
      <h2>Export</h2>
      <p>Save your manually entered BPMs to a CSV file.</p>
      <button id="export-btn" type="button">Export CSV</button>
    </div>

    <div class="group">
      <h2>Import</h2>
      <p>Restore or transfer manual BPMs from a CSV file.</p>
      <label class="replace-row">
        <input type="checkbox" id="replace-all" />
        Replace all existing manual BPMs
      </label>
      <button id="import-btn" type="button">Import CSV</button>
      <input
        type="file"
        id="file-input"
        class="hidden-file"
        accept=".csv,text/csv"
      />
    </div>

    <div id="status" class="info"></div>

    <script src="popup.js"></script>
  </body>
</html>
